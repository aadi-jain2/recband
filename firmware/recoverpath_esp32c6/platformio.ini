; RecoverPath — ESP32-C6 PlatformIO project
; ─────────────────────────────────────────────────────────────
; Board: Any ESP32-C6 DevKit (Seeed XIAO ESP32C6, Espressif DevKitC-1, etc.)
; Framework: Arduino

[env:esp32c6]
platform   = espressif32
board      = esp32-c6-devkitc-1
framework  = arduino

monitor_speed    = 115200
upload_speed     = 921600
monitor_filters  = esp32_exception_decoder, time

build_flags =
    -DCORE_DEBUG_LEVEL=1
    -DARDUINO_USB_MODE=1

lib_deps =
    bblanchon/ArduinoJson @ ^7.0.4
    sparkfun/SparkFun MAX3010x Pulse and Proximity Sensor Library @ ^1.1.2
    ; Firebase ESP Client — use mobizt for latest ESP32-C6 support
    mobizt/Firebase ESP Client @ ^4.4.17
