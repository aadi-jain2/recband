; INMP441 I2S Microphone Test — ESP32-C6
; Flash this FIRST to verify the mic works before integrating
; into the main RecoverPath firmware.

[env:esp32c6]
platform   = espressif32
board      = esp32-c6-devkitc-1
framework  = arduino
monitor_speed = 115200
upload_speed  = 921600
monitor_filters = time, esp32_exception_decoder
