; RecoverPath ESP32C6 PlatformIO configuration
; Board: Seeed XIAO ESP32C6 or any ESP32-C6 DevKit

[env:esp32c6]
platform    = espressif32
board       = esp32-c6-devkitc-1
framework   = arduino

; Serial monitor
monitor_speed = 115200

; Libraries
lib_deps =
    mobizt/Firebase ESP Client @ ^4.4.17
    tzapu/WiFiManager @ ^2.0.17
    sparkfun/SparkFun MAX3010x Pulse and Proximity Sensor Library @ ^1.1.2

; Build flags
build_flags =
    -DCORE_DEBUG_LEVEL=1
    -DBOARD_HAS_PSRAM

; Upload settings
upload_speed   = 921600
upload_protocol = esptool
